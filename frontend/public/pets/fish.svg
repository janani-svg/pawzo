<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="fishbg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#175676"/>
      <stop offset="100%" stop-color="#0A2A40"/>
    </radialGradient>
    <radialGradient id="fishbody" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FF8C2A"/>
      <stop offset="100%" stop-color="#E06010"/>
    </radialGradient>
  </defs>
  <rect width="300" height="300" fill="url(#fishbg)" rx="22"/>
  <!-- Bubbles -->
  <circle cx="245" cy="60" r="9" fill="none" stroke="#BCF4F5" stroke-width="1.5" opacity="0.5"/>
  <circle cx="258" cy="88" r="6" fill="none" stroke="#BCF4F5" stroke-width="1.5" opacity="0.4"/>
  <circle cx="240" cy="108" r="4" fill="none" stroke="#BCF4F5" stroke-width="1.5" opacity="0.3"/>
  <circle cx="55" cy="240" r="7" fill="none" stroke="#BCF4F5" stroke-width="1.5" opacity="0.4"/>
  <circle cx="72" cy="260" r="4" fill="none" stroke="#BCF4F5" stroke-width="1.5" opacity="0.3"/>
  <!-- Seaweed left -->
  <path d="M45 300 Q32 270 46 240 Q30 210 44 180" fill="none" stroke="#2E8B57" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <path d="M68 300 Q78 268 62 238 Q78 208 60 178" fill="none" stroke="#1E6B3A" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <!-- Tail fin -->
  <path d="M238 140 Q278 100 278 150 Q278 200 238 162 Z" fill="#FF6A00"/>
  <path d="M238 140 Q268 112 262 152 Q268 188 238 162 Z" fill="#FF8C30"/>
  <!-- Tail fin stripes -->
  <path d="M248 125 Q272 148 248 172" fill="none" stroke="#FFB060" stroke-width="1.5" opacity="0.6"/>
  <path d="M258 130 Q278 150 258 170" fill="none" stroke="#FFB060" stroke-width="1.5" opacity="0.6"/>
  <!-- Body -->
  <ellipse cx="148" cy="152" rx="100" ry="68" fill="url(#fishbody)"/>
  <!-- White belly -->
  <ellipse cx="148" cy="168" rx="70" ry="38" fill="#FFF8E8" opacity="0.65"/>
  <!-- Dorsal fin (top) -->
  <path d="M100 88 Q126 62 160 84 Q150 90 100 88 Z" fill="#FF6A00"/>
  <path d="M100 88 Q126 68 160 84" fill="none" stroke="#FF9040" stroke-width="1.5" opacity="0.7"/>
  <!-- Pectoral fin left -->
  <path d="M112 158 Q80 178 76 208 Q100 192 116 170 Z" fill="#FF7A20" opacity="0.9"/>
  <!-- Pectoral fin right (small) -->
  <path d="M188 154 Q210 168 216 194 Q200 180 190 164 Z" fill="#FF7A20" opacity="0.9"/>
  <!-- Scales pattern -->
  <ellipse cx="120" cy="140" rx="18" ry="14" fill="none" stroke="#FF9840" stroke-width="1.2" opacity="0.4"/>
  <ellipse cx="148" cy="138" rx="18" ry="14" fill="none" stroke="#FF9840" stroke-width="1.2" opacity="0.4"/>
  <ellipse cx="176" cy="140" rx="18" ry="14" fill="none" stroke="#FF9840" stroke-width="1.2" opacity="0.4"/>
  <ellipse cx="132" cy="158" rx="18" ry="14" fill="none" stroke="#FF9840" stroke-width="1.2" opacity="0.4"/>
  <ellipse cx="160" cy="156" rx="18" ry="14" fill="none" stroke="#FF9840" stroke-width="1.2" opacity="0.4"/>
  <!-- White vertical stripes -->
  <ellipse cx="130" cy="152" rx="6" ry="36" fill="white" opacity="0.45"/>
  <ellipse cx="158" cy="152" rx="6" ry="36" fill="white" opacity="0.45"/>
  <!-- Eye ring -->
  <circle cx="84" cy="140" r="20" fill="#FFF0C0"/>
  <!-- Eye -->
  <circle cx="84" cy="140" r="15" fill="#1A0A0A"/>
  <circle cx="84" cy="140" r="9" fill="#2A2AFF" opacity="0.6"/>
  <circle cx="84" cy="140" r="5" fill="#0A0A0A"/>
  <circle cx="87" cy="136" r="4" fill="white" opacity="0.95"/>
  <circle cx="89" cy="134" r="2" fill="white"/>
  <!-- Mouth -->
  <path d="M48 155 Q60 148 52 162" fill="none" stroke="#D05010" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Anal fin (bottom) -->
  <path d="M130 215 Q150 238 170 215 Q160 222 150 224 Q140 222 130 215 Z" fill="#FF7A20" opacity="0.8"/>
</svg>
