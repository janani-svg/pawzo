<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFD6B0"/>
      <stop offset="100%" stop-color="#FFC2C2"/>
    </radialGradient>
    <radialGradient id="fur" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#E8A84C"/>
      <stop offset="100%" stop-color="#C87830"/>
    </radialGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bg)" rx="22"/>
  <!-- Ears -->
  <ellipse cx="88" cy="118" rx="34" ry="52" fill="#B06820" transform="rotate(-12 88 118)"/>
  <ellipse cx="212" cy="118" rx="34" ry="52" fill="#B06820" transform="rotate(12 212 118)"/>
  <ellipse cx="88" cy="122" rx="20" ry="34" fill="#D08040" transform="rotate(-12 88 122)"/>
  <ellipse cx="212" cy="122" rx="20" ry="34" fill="#D08040" transform="rotate(12 212 122)"/>
  <!-- Head -->
  <ellipse cx="150" cy="138" rx="82" ry="78" fill="url(#fur)"/>
  <!-- Forehead lighter patch -->
  <ellipse cx="150" cy="108" rx="50" ry="30" fill="#F0B860" opacity="0.5"/>
  <!-- Eyes -->
  <ellipse cx="120" cy="122" rx="15" ry="16" fill="#2C1A04"/>
  <ellipse cx="180" cy="122" rx="15" ry="16" fill="#2C1A04"/>
  <circle cx="124" cy="118" r="5" fill="white" opacity="0.9"/>
  <circle cx="184" cy="118" r="5" fill="white" opacity="0.9"/>
  <circle cx="126" cy="116" r="2" fill="white"/>
  <circle cx="186" cy="116" r="2" fill="white"/>
  <!-- Eyebrows -->
  <path d="M108 106 Q120 100 132 105" fill="none" stroke="#8B4A10" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M168 105 Q180 100 192 106" fill="none" stroke="#8B4A10" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Snout -->
  <ellipse cx="150" cy="155" rx="32" ry="24" fill="#E09850"/>
  <!-- Nose -->
  <ellipse cx="150" cy="146" rx="16" ry="11" fill="#1A0800"/>
  <ellipse cx="144" cy="148" rx="4.5" ry="3" fill="#2A1000" opacity="0.6"/>
  <ellipse cx="156" cy="148" rx="4.5" ry="3" fill="#2A1000" opacity="0.6"/>
  <ellipse cx="149" cy="144" rx="8" ry="2.5" fill="#3A1800" opacity="0.4"/>
  <!-- Mouth -->
  <path d="M138 160 Q150 170 162 160" fill="none" stroke="#8B4A10" stroke-width="2" stroke-linecap="round"/>
  <!-- Tongue -->
  <ellipse cx="150" cy="168" rx="13" ry="9" fill="#E86080"/>
  <line x1="150" y1="160" x2="150" y2="177" stroke="#D04060" stroke-width="1.5"/>
  <!-- Cheeks blush -->
  <ellipse cx="100" cy="148" rx="14" ry="9" fill="#E86060" opacity="0.25"/>
  <ellipse cx="200" cy="148" rx="14" ry="9" fill="#E86060" opacity="0.25"/>
  <!-- Collar -->
  <rect x="100" y="205" width="100" height="16" rx="8" fill="#BA324F"/>
  <circle cx="150" cy="213" r="6" fill="#D4AF37"/>
</svg>
