  <ellipse cx="150" cy="98" rx="38" ry="28" fill="#4BA3C3"/>
  <!-- Red cheek patches -->
  <ellipse cx="116" cy="125" rx="18" ry="14" fill="#D62839"/>
  <ellipse cx="184" cy="125" rx="18" ry="14" fill="#D62839"/>
  <!-- Eyes -->
  <circle cx="122" cy="108" r="14" fill="#0A0A0A"/>
  <circle cx="178" cy="108" r="14" fill="#0A0A0A"/>
  <circle cx="120" cy="108" r="8" fill="#F0C040"/>
  <circle cx="176" cy="108" r="8" fill="#F0C040"/>
  <circle cx="121" cy="108" r="5" fill="#0A0A0A"/>
  <circle cx="177" cy="108" r="5" fill="#0A0A0A"/>
  <circle cx="123" cy="105" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="179" cy="105" r="2.5" fill="white" opacity="0.9"/>
  <!-- Beak -->
  <ellipse cx="150" cy="130" rx="18" ry="10" fill="#D4AF37"/>
  <path d="M132 130 Q150 145 168 130" fill="#B8960A"/>
  <path d="M132 130 Q150 125 168 130" fill="#E0C030"/>
  <!-- Beak highlight -->
  <ellipse cx="150" cy="127" rx="10" ry="4" fill="#F0D850" opacity="0.6"/>
  <!-- Yellow chest -->
  <ellipse cx="150" cy="200" rx="35" ry="30" fill="#D9F200" opacity="0.8"/>
  <!-- Feet perching -->
  <path d="M125 262 Q120 272 110 278 M120 262 Q115 272 108 280 M130 265 Q128 278 124 284" fill="none" stroke="#6B4A0A" stroke-width="3" stroke-linecap="round"/>
  <path d="M175 262 Q180 272 190 278 M180 262 Q185 272 192 280 M170 265 Q172 278 176 284" fill="none" stroke="#6B4A0A" stroke-width="3" stroke-linecap="round"/>
</svg>
