<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="pbg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#B4EBCA"/>
      <stop offset="100%" stop-color="#7ACCA0"/>
    </radialGradient>
  </defs>
  <rect width="300" height="300" fill="url(#pbg)" rx="22"/>
  <!-- Body -->
  <ellipse cx="150" cy="195" rx="60" ry="72" fill="#2E8B57"/>
  <!-- Wings -->
  <ellipse cx="95" cy="185" rx="32" ry="55" fill="#1E6B3A" transform="rotate(-18 95 185)"/>
  <ellipse cx="205" cy="185" rx="32" ry="55" fill="#1E6B3A" transform="rotate(18 205 185)"/>
  <!-- Wing feather detail left -->
  <path d="M78 150 Q88 175 80 200" fill="none" stroke="#3AAA60" stroke-width="2" stroke-linecap="round"/>
  <path d="M88 148 Q98 172 90 200" fill="none" stroke="#3AAA60" stroke-width="2" stroke-linecap="round"/>
  <!-- Wing feather detail right -->
  <path d="M222 150 Q212 175 220 200" fill="none" stroke="#3AAA60" stroke-width="2" stroke-linecap="round"/>
  <path d="M212 148 Q202 172 210 200" fill="none" stroke="#3AAA60" stroke-width="2" stroke-linecap="round"/>
  <!-- Tail feathers -->
  <ellipse cx="138" cy="268" rx="10" ry="30" fill="#1A7B3A" transform="rotate(-10 138 268)"/>
  <ellipse cx="150" cy="272" rx="10" ry="32" fill="#228B44"/>
  <ellipse cx="162" cy="268" rx="10" ry="30" fill="#1A7B3A" transform="rotate(10 162 268)"/>
  <!-- Head -->
  <circle cx="150" cy="118" r="62" fill="#2E8B57"/>
